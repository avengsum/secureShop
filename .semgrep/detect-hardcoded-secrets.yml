rules:
  - id: hardcoded-jwt-secret
    severity: WARNING
    
    metadata:
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      owasp:
        - A07:2021 - Identification and Authentication Failures
      confidence: MEDIUM
      
    message: >
      Hardcoded JWT secret detected. Secrets should never be committed to source code.
      Use environment variables (e.g. `process.env.JWT_SECRET`) instead.
      
    patterns:
      - pattern: jwt.sign($PAYLOAD, "...", ...)
      # Exclude cases where it's an environment variable or config property
      - pattern-not: jwt.sign($PAYLOAD, process.env.$SECRET, ...)
      - pattern-not: jwt.sign($PAYLOAD, $CONFIG.$SECRET, ...)
      
    languages:
      - javascript
